services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/spark.db:/app/backend/spark.db
    restart: unless-stopped
