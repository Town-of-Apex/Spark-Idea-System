services:
  backend:
    # Build from the same Dockerfile
    build:
      context: .
      dockerfile: backend.Dockerfile
    # Override command to enable hot-reloading
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      # Mount the entire backend folder (covers templates/, static/, and .py files for hot reload)
      - ./backend:/app/backend
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=development
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/api
    extra_hosts:
      - "host.docker.internal:host-gateway"

# Run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
